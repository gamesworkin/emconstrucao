<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><title>Admin</title><link rel="stylesheet" href="../style.css"></head>
<body>
    <div class="dynamic-background"></div>
    <main class="main-container">
        <h1>Painel Admin</h1>
        <button onclick="render('header')">Gerenciar Cabeçalho</button>
        <button onclick="render('servicos')">Gerenciar Serviços</button>
        <div id="controls">
            <input id="t" placeholder="Título"><input id="d" placeholder="Desc (se for serviço)"><input id="u" placeholder="URL"><input id="l" placeholder="Logo (se for serviço)">
            <button onclick="add('servicos')">Adicionar Serviço</button>
            <button onclick="add('header')">Adicionar Header</button>
        </div>
        <div id="list"></div>
        <button onclick="firebase.auth().signOut().then(()=>location.href='index.html')" style="background:#d97706;">Sair</button>
    </main>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="admin-logic.js"></script>
</body></html>
